<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>PIVOCODER</title>
  <style>
    /* ── Reset & Variables ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --g:     #00ff88;
      --g-dim: #006633;
      --g-mid: #00cc66;
      --r:     #ff3344;
      --a:     #ffaa00;
      --bg:    #04060d;
      --panel: #080c18;
      --line:  rgba(0,255,136,0.12);
      --font:  'Courier New', 'Lucida Console', monospace;
    }

    /* ── Body & CRT effects ────────────────────────────────────────────── */
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--g);
      font-family: var(--font);
      overflow-x: hidden;
    }

    /* scanlines */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px, transparent 3px,
        rgba(0,0,0,0.18) 3px, rgba(0,0,0,0.18) 4px
      );
      pointer-events: none;
      z-index: 9000;
    }

    /* vignette */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center,
        transparent 60%,
        rgba(0,0,0,0.55) 100%
      );
      pointer-events: none;
      z-index: 9001;
    }

    /* ── Layout ────────────────────────────────────────────────────────── */
    .wrap {
      max-width: 540px;
      margin: 0 auto;
      padding: 14px 14px 40px;
    }

    /* ── Header ────────────────────────────────────────────────────────── */
    header {
      text-align: center;
      padding: 22px 0 18px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 16px;
    }

    .logo {
      font-size: clamp(2rem, 9vw, 2.8rem);
      letter-spacing: 0.35em;
      text-indent: 0.35em;
      text-shadow:
        0 0 8px  var(--g),
        0 0 24px var(--g),
        0 0 60px rgba(0,255,136,0.35);
      animation: glow-pulse 5s ease-in-out infinite;
    }

    .tagline {
      margin-top: 5px;
      font-size: 0.6rem;
      letter-spacing: 0.55em;
      text-indent: 0.55em;
      color: var(--g-dim);
    }

    @keyframes glow-pulse {
      0%,100% { text-shadow: 0 0 8px var(--g), 0 0 24px var(--g), 0 0 50px rgba(0,255,136,.3); }
      50%      { text-shadow: 0 0 12px var(--g), 0 0 40px var(--g), 0 0 90px rgba(0,255,136,.5); }
    }

    /* ── Panel ─────────────────────────────────────────────────────────── */
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 3px;
      padding: 14px;
      margin-bottom: 14px;
      position: relative;
    }

    /* corner accents */
    .panel::before,
    .panel::after {
      content: '';
      position: absolute;
      width: 10px; height: 10px;
      border-color: var(--g-mid);
      border-style: solid;
      opacity: 0.5;
    }
    .panel::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .panel::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    .panel-title {
      font-size: 0.58rem;
      letter-spacing: 0.5em;
      text-indent: 0.5em;
      color: var(--g-dim);
      margin-bottom: 12px;
    }

    /* ── Status rows ───────────────────────────────────────────────────── */
    .status-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 4px;
      border-bottom: 1px solid var(--line);
    }
    .status-row:last-child { border-bottom: none; }

    .led {
      flex-shrink: 0;
      width: 11px; height: 11px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.5);
      transition: background 0.4s, box-shadow 0.4s;
    }
    .led-on {
      background: var(--g);
      box-shadow: 0 0 5px var(--g), 0 0 12px var(--g);
      animation: led-throb 2.5s ease-in-out infinite;
    }
    .led-off {
      background: var(--r);
      box-shadow: 0 0 4px var(--r);
    }
    .led-unknown {
      background: #333;
      box-shadow: none;
    }

    @keyframes led-throb {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.55; }
    }

    .s-label {
      flex: 1;
      font-size: 0.78rem;
      letter-spacing: 0.14em;
    }
    .s-value {
      font-size: 0.7rem;
      color: var(--g-mid);
      text-align: right;
      max-width: 55%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Preset list ───────────────────────────────────────────────────── */
    .preset-list {
      display: flex;
      flex-direction: column;
      gap: 7px;
      max-height: 45vh;
      overflow-y: auto;
      padding-right: 2px;
    }

    .preset-btn {
      display: block;
      width: 100%;
      background: transparent;
      border: 1px solid var(--line);
      color: var(--g);
      font-family: var(--font);
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      padding: 13px 14px;
      text-align: left;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .preset-btn:hover  { background: rgba(0,255,136,0.05); border-color: var(--g-mid); }
    .preset-btn:active { background: rgba(0,255,136,0.12); }

    .preset-btn.active {
      background: rgba(0,255,136,0.1);
      border-color: var(--g);
      color: #fff;
      box-shadow: inset 0 0 14px rgba(0,255,136,0.08), 0 0 6px rgba(0,255,136,0.15);
    }
    .preset-btn.active::before { content: '▶  '; }

    .preset-empty {
      font-size: 0.72rem;
      color: var(--g-dim);
      padding: 8px 4px;
    }

    /* ── Restart button ────────────────────────────────────────────────── */
    .restart-btn {
      display: block;
      width: 100%;
      background: transparent;
      border: 1px solid rgba(255,51,68,0.35);
      color: var(--r);
      font-family: var(--font);
      font-size: 0.78rem;
      letter-spacing: 0.35em;
      text-indent: 0.35em;
      padding: 16px;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.12s, border-color 0.12s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .restart-btn:hover  { background: rgba(255,51,68,0.06); border-color: var(--r); }
    .restart-btn:active { background: rgba(255,51,68,0.14); }

    /* ── Toast ─────────────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: #0a1020;
      border: 1px solid var(--g);
      color: var(--g);
      padding: 9px 20px;
      font-family: var(--font);
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      border-radius: 2px;
      white-space: nowrap;
      z-index: 9500;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast.error { border-color: var(--r); color: var(--r); }

    /* ── Footer ────────────────────────────────────────────────────────── */
    .footer {
      text-align: center;
      font-size: 0.55rem;
      letter-spacing: 0.4em;
      color: #0d1f14;
      padding: 20px 0 0;
    }

    /* ── Scrollbar ─────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--g-dim); border-radius: 2px; }
  </style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <header>
    <div class="logo">PIVOCODER</div>
    <div class="tagline">AUDIO CONTROL SYSTEM // JACK + CARLA ENGINE</div>
  </header>

  <!-- STATUS PANEL -->
  <div class="panel">
    <div class="panel-title">[ ESTADO DEL SISTEMA ]</div>

    <div class="status-row">
      <div class="led led-unknown" id="led-jack"></div>
      <span class="s-label">JACK AUDIO</span>
      <span class="s-value" id="val-jack">—</span>
    </div>

    <div class="status-row">
      <div class="led led-unknown" id="led-carla"></div>
      <span class="s-label">CARLA</span>
      <span class="s-value" id="val-carla">—</span>
    </div>

    <div class="status-row">
      <span class="s-label">PRESET ACTIVO</span>
      <span class="s-value" id="val-preset">—</span>
    </div>
  </div>

  <!-- PRESETS PANEL -->
  <div class="panel">
    <div class="panel-title">[ PRESETS // <span id="preset-dir">prod/</span> ]</div>
    <div class="preset-list" id="preset-list">
      <div class="preset-empty">Cargando presets...</div>
    </div>
  </div>

  <!-- CONTROL PANEL -->
  <div class="panel">
    <div class="panel-title">[ CONTROL ]</div>
    <button class="restart-btn" onclick="doRestart()">⟳ REINICIAR SISTEMA</button>
  </div>

  <div class="footer">PIVOCODER CONTROL INTERFACE &nbsp;// &nbsp;RASPBERRY PI</div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  'use strict';

  let _currentPreset = null;
  let _knownPresets  = [];
  let _toastTimer    = null;

  // ── Toast ─────────────────────────────────────────────────────────────
  function toast(msg, isError = false, ms = 2200) {
    const el = document.getElementById('toast');
    clearTimeout(_toastTimer);
    el.textContent = msg;
    el.className = 'toast show' + (isError ? ' error' : '');
    _toastTimer = setTimeout(() => { el.className = 'toast'; }, ms);
  }

  // ── LED helper ────────────────────────────────────────────────────────
  function setLed(id, state) {
    const el = document.getElementById(id);
    el.className = 'led ' + (state === true ? 'led-on' : state === false ? 'led-off' : 'led-unknown');
  }

  // ── Render preset list ────────────────────────────────────────────────
  function renderPresets(presets, current) {
    const container = document.getElementById('preset-list');
    if (!presets.length) {
      container.innerHTML = '<div class="preset-empty">Sin presets en prod/</div>';
      return;
    }
    container.innerHTML = presets.map(p => {
      const label = p.replace(/\.carxp$/i, '');
      const active = p === current ? ' active' : '';
      return `<button class="preset-btn${active}" data-preset="${p}" onclick="loadPreset('${p}')">${label}</button>`;
    }).join('');
  }

  // ── Status poll ───────────────────────────────────────────────────────
  async function pollStatus() {
    try {
      const res  = await fetch('/api/status');
      const data = await res.json();

      setLed('led-jack',  data.jack);
      setLed('led-carla', data.carla);

      document.getElementById('val-jack').textContent  = data.jack  ? 'ONLINE' : 'OFFLINE';
      document.getElementById('val-carla').textContent = data.carla
        ? (data.carla_pid ? `ONLINE  PID:${data.carla_pid}` : 'ONLINE')
        : 'OFFLINE';

      document.getElementById('val-preset').textContent =
        data.preset ? data.preset.replace(/\.carxp$/i, '') : '—';

      // Update active button if preset changed
      if (data.preset !== _currentPreset) {
        _currentPreset = data.preset;
        document.querySelectorAll('.preset-btn').forEach(btn => {
          const isActive = btn.dataset.preset === _currentPreset;
          btn.classList.toggle('active', isActive);
          btn.textContent = (isActive ? '' : '') + btn.dataset.preset.replace(/\.carxp$/i, '');
          if (isActive) btn.textContent = '';  // replaced by ::before
        });
        renderPresets(_knownPresets, _currentPreset);
      }
    } catch (_) { /* network hiccup – silently ignore */ }
  }

  // ── Load preset list ──────────────────────────────────────────────────
  async function loadPresetList() {
    try {
      const res  = await fetch('/api/presets');
      const data = await res.json();
      _knownPresets  = data.presets;
      _currentPreset = data.current;
      renderPresets(_knownPresets, _currentPreset);
    } catch (e) {
      document.getElementById('preset-list').innerHTML =
        '<div class="preset-empty">Error cargando presets</div>';
    }
  }

  // ── Load a preset ─────────────────────────────────────────────────────
  async function loadPreset(name) {
    const label = name.replace(/\.carxp$/i, '');
    toast(`CARGANDO: ${label}`);
    try {
      const res  = await fetch('/api/preset', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ preset: name }),
      });
      const data = await res.json();
      if (data.ok) {
        _currentPreset = name;
        renderPresets(_knownPresets, _currentPreset);
        toast(`OK: ${label}`);
      } else {
        toast('ERROR: ' + (data.error || 'fallo'), true, 3500);
      }
    } catch (_) {
      toast('ERROR DE RED', true, 3500);
    }
  }

  // ── Restart ───────────────────────────────────────────────────────────
  async function doRestart() {
    toast('REINICIANDO...', false, 4000);
    try {
      const res  = await fetch('/api/restart', { method: 'POST' });
      const data = await res.json();
      if (data.ok) {
        toast('SISTEMA REINICIADO');
        await loadPresetList();
      } else {
        toast('ERROR: ' + (data.error || 'fallo'), true, 3500);
      }
    } catch (_) {
      toast('ERROR DE RED', true, 3500);
    }
  }

  // ── Init ──────────────────────────────────────────────────────────────
  loadPresetList();
  pollStatus();
  setInterval(pollStatus, 3000);
</script>
</body>
</html>
